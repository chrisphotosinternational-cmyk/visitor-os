name: Apply knowledge score fix

on:
  push:
    branches:
      - fix/knowledge-search-score-ordering-v2

permissions:
  contents: write

jobs:
  apply-fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/knowledge-search-score-ordering-v2
      - name: Apply SQL ordering fix
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('backend/src/modules/kms/knowledge-repository.ts')
          text = path.read_text()
          old = """      order by score::numeric desc, d.updated_at desc
"""
          new = """      order by (
        (
          select count(*)
          from unnest(c.tokens) token
          where token = any($3::text[])
        ) * 0.22
        + case when d.title ilike '%' || $4 || '%' then 0.35 else 0 end
        + case when $4 = any(d.tags) then 0.25 else 0 end
      ) desc, d.updated_at desc
"""
          if old not in text:
              raise SystemExit('Expected ORDER BY clause not found')
          path.write_text(text.replace(old, new, 1))
          PY
      - name: Remove temporary files and commit
        shell: bash
        run: |
          rm .github/workflows/apply-knowledge-score-fix.yml
          rm -f .github/trigger-knowledge-score-fix
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix knowledge search score ordering"
          git push origin HEAD:fix/knowledge-search-score-ordering-v2
