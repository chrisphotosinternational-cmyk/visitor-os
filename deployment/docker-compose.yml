services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-visitor_os}
      POSTGRES_USER: ${POSTGRES_USER:-visitor_os}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-visitor_os_change_me}
    volumes:
      - visitor_os_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-visitor_os} -d ${POSTGRES_DB:-visitor_os}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.backend
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-visitor_os}:${POSTGRES_PASSWORD:-visitor_os_change_me}@postgres:5432/${POSTGRES_DB:-visitor_os}
      BUSINESS_CONFIG_DIR: /app/configs
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    volumes:
      - ../configs:/app/configs:ro
      - visitor_os_logs:/app/logs

  frontend:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.frontend
    restart: unless-stopped
    environment:
      VISITOR_OS_API_URL: ${VISITOR_OS_API_URL:-}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5173}:80"

volumes:
  visitor_os_postgres:
  visitor_os_logs:

